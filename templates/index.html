<!DOCTYPE html>
<html>
<body>
    <h1>Calculadora Simples</h1>
    <form method="POST">
        {% csrf_token %}
        <input type="number" name="n1" step="any" required>
        <select name="op">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <input type="number" name="n2" step="any" required>
        <button type="submit">Calcular</button>
    </form>
    {% if resultado != '' %}
        <h2>Resultado: {{ resultado }}</h2>
    {% endif %}
</body>
</html>
